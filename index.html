<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌詞カード管理</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" id="themeColorMeta" content="#2fb6c4">
<script>
(function () {
  var w = localStorage.getItem('lyricsAppWorld') || 'minato';
  document.documentElement.setAttribute('data-world', w);
  if (w === 'noa') {
    var h = new Date().getHours();
    document.documentElement.setAttribute('data-noa-time', (h >= 0 && h < 6) ? 'night' : 'day');
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root,
[data-world="minato"] {
  --bg: #eef7f6;
  --surface: rgba(255,255,255,.55);
  --surface2: rgba(255,255,255,.75);
  --header-bg: linear-gradient(135deg, rgba(255,255,255,.6), rgba(170,224,224,.35));
  --header-blur: blur(14px);
  --accent: #2fb6c4;
  --accent2: #1e6b73;
  --on-accent: #ffffff;
  --text: #17383b;
  --text-dim: #5c7a7d;
  --border: rgba(23,56,59,.15);
  --radius-card: 14px;
  --radius-btn: 10px;
  --font-main: 'Shippori Mincho', serif;
  --shadow-card: 0 4px 20px rgba(47,182,196,.15);
  --fade: 0s;
}

[data-world="noa"] {
  --bg: #fff6ea;
  --surface: #ffffff;
  --surface2: #fff2df;
  --header-bg: linear-gradient(135deg, #ffe3ec, #fff6ea);
  --header-blur: none;
  --accent: #ff8fab;
  --accent2: #e6608a;
  --on-accent: #ffffff;
  --text: #4a3b32;
  --text-dim: #9c8b7e;
  --border: #f0ddc9;
  --radius-card: 20px;
  --radius-btn: 18px;
  --font-main: 'M PLUS Rounded 1c', sans-serif;
  --shadow-card: 0 4px 16px rgba(255,143,171,.25);
}

[data-world="noa"][data-noa-time="night"] {
  --bg: #14180f;
  --surface: #1c2216;
  --surface2: #202a18;
  --header-bg: linear-gradient(135deg, #1c2216, #14180f);
  --accent: #c9a227;
  --accent2: #a9861d;
  --on-accent: #1c1a0d;
  --text: #e8e4d8;
  --text-dim: #9a9788;
  --border: #2c3324;
  --shadow-card: 0 4px 16px rgba(201,162,39,.2);
}

html.fading-to-night { --fade: 4s; }

body {
  font-family: var(--font-main), -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  transition: background-color var(--fade) ease, color var(--fade) ease;
}

/* モーダル表示中、一覧側のスクロールを完全に固定する（lockBodyScroll参照） */
body.scroll-locked {
  position: fixed;
  left: 0;
  right: 0;
  overflow: hidden;
}

header {
  background: var(--header-bg);
  backdrop-filter: var(--header-blur);
  -webkit-backdrop-filter: var(--header-blur);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
  border-bottom: 1px solid var(--border);
  transition: background-color var(--fade) ease, border-color var(--fade) ease;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  gap: 12px;
}

header h1 {
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.world-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
}

.world-toggle .toggle-label {
  font-size: .8rem;
  color: var(--text-dim);
  transition: color .15s;
}

.world-toggle .toggle-label.active {
  color: var(--accent);
  font-weight: 700;
}

.toggle-track {
  width: 44px;
  height: 24px;
  border-radius: 999px;
  background: var(--surface2);
  border: 1px solid var(--border);
  position: relative;
  transition: background-color .15s;
}

.toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent);
  transition: transform .2s ease;
}

[data-world="noa"] .toggle-thumb { transform: translateX(20px); }

.water-line {
  display: none;
  height: 2px;
  margin-top: 12px;
  border-radius: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  box-shadow: 0 0 10px var(--accent);
}

[data-world="minato"] .water-line { display: block; }

.search-bar {
  display: flex;
  gap: 8px;
}

.search-bar input {
  flex: 1;
  padding: 10px 14px;
  border-radius: var(--radius-btn);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 1rem;
}

.search-bar input::placeholder { color: var(--text-dim); }

.btn {
  padding: 10px 18px;
  border-radius: var(--radius-btn);
  border: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform .1s, opacity .2s;
  white-space: nowrap;
}

.btn:active { transform: scale(.95); }

.btn-primary {
  background: var(--accent);
  color: var(--on-accent);
}

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-danger {
  background: #c0392b;
  color: #fff;
}

.btn-sm {
  padding: 6px 12px;
  font-size: .85rem;
}

main {
  padding: 16px;
  max-width: 800px;
  margin: 0 auto;
}

.card-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: var(--surface);
  border-radius: var(--radius-card);
  padding: 16px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color .2s, background-color var(--fade) ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card:hover { border-color: var(--accent); }

.card-body {
  flex: 1;
  min-width: 0;
}

.card-grip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 44px;
  margin: -16px 0;
  color: var(--text-dim);
  cursor: grab;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

.card-grip:active { cursor: grabbing; color: var(--accent); }

.card.dragging {
  opacity: .85;
  box-shadow: 0 8px 24px rgba(0,0,0,.3);
}

.drag-placeholder {
  border: 2px dashed var(--accent);
  border-radius: var(--radius-card);
  box-sizing: border-box;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.card-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
}

.card-character {
  font-size: .85rem;
  color: var(--accent2);
  background: var(--surface2);
  padding: 2px 10px;
  border-radius: 20px;
  border: 1px solid var(--accent2);
  white-space: nowrap;
}

.card-lyrics {
  font-size: .9rem;
  color: var(--text-dim);
  white-space: pre-wrap;
  max-height: 4.5em;
  overflow: hidden;
  line-height: 1.5;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state p { margin-top: 8px; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: var(--surface);
  width: 100%;
  max-width: 800px;
  max-height: 90dvh;
  border-radius: 16px 16px 0 0;
  padding: 20px;
  overflow-y: auto;
  overscroll-behavior-y: contain;
  animation: slideUp .25s ease-out;
  backdrop-filter: var(--header-blur);
  -webkit-backdrop-filter: var(--header-blur);
}

@media (min-width: 600px) {
  .modal-overlay.active {
    align-items: center;
  }
  .modal {
    border-radius: 16px;
    max-height: 80dvh;
    margin: 20px;
  }
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal h2 {
  margin-bottom: 16px;
  font-size: 1.1rem;
}

.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: .85rem;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-btn);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 1rem;
  font-family: inherit;
}

.form-group textarea {
  min-height: 200px;
  resize: vertical;
  line-height: 1.6;
}

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.modal-actions .btn { flex: 1; }

.modal-actions-right {
  display: flex;
  gap: 8px;
}

/* Detail view */
.detail-lyrics {
  white-space: pre-wrap;
  line-height: 1.8;
  font-size: 1rem;
  padding: 12px 0;
}

.detail-meta {
  font-size: .8rem;
  color: var(--text-dim);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* FAB */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--on-accent);
  border: none;
  font-size: 2rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
  transition: transform .15s;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.fab:active { transform: scale(.9); }

.fab-import {
  bottom: 90px;
  width: 44px;
  height: 44px;
  background: var(--surface2);
  color: var(--accent);
  border: 1px solid var(--accent);
  display: flex;
}

/* Lucide線画アイコン共通 */
.icon {
  display: inline-block;
  vertical-align: middle;
  flex-shrink: 0;
}

.icon-header {
  width: 20px;
  height: 20px;
  color: var(--accent);
}

.icon-empty {
  width: 36px;
  height: 36px;
  color: var(--accent);
  margin-bottom: 4px;
}

.icon-import {
  width: 22px;
  height: 22px;
}

.count-badge {
  font-size: .85rem;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.sort-toggle {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  overflow-x: auto;
}

.sort-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  font-size: .8rem;
  white-space: nowrap;
  cursor: pointer;
  transition: background-color .15s, color .15s, border-color .15s;
}

.sort-btn.active {
  background: var(--accent);
  color: var(--on-accent);
  border-color: var(--accent);
}

.icon-sort {
  width: 16px;
  height: 16px;
}

.icon-grip {
  width: 18px;
  height: 18px;
}

.highlight {
  background: var(--accent);
  color: var(--on-accent);
  border-radius: 2px;
}

/* Import mode */
.import-counter {
  font-size: .8rem;
  color: var(--accent);
  font-weight: 400;
}

.import-tag-info {
  font-size: .85rem;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.import-tag-info strong {
  color: var(--accent);
}

.import-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .9rem;
  color: var(--text);
  cursor: pointer;
}

.import-error {
  font-size: .85rem;
  color: #c0392b;
  background: rgba(192,57,43,.1);
  border: 1px solid rgba(192,57,43,.3);
  border-radius: var(--radius-btn);
  padding: 10px 12px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>
      <svg class="icon icon-header" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13" />
        <circle cx="6" cy="18" r="3" />
        <circle cx="18" cy="16" r="3" />
      </svg>
      歌詞カード管理
    </h1>
    <div class="world-toggle" id="worldToggle">
      <span class="toggle-label" id="labelMinato">湊</span>
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-label" id="labelNoa">ノア</span>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="タイトル・歌詞で検索...">
  </div>
  <div class="water-line"></div>
</header>

<main>
  <div class="sort-toggle" id="sortToggle">
    <button class="sort-btn" data-mode="new" title="新しい順">
      <svg class="icon icon-sort" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 6v6l2 1" />
        <path d="M12.337 21.994a10 10 0 1 1 9.588-8.767" />
        <path d="m14 18 4 4 4-4" />
        <path d="M18 14v8" />
      </svg>
      <span>新しい順</span>
    </button>
    <button class="sort-btn" data-mode="old" title="古い順">
      <svg class="icon icon-sort" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 6v6l1.56.78" />
        <path d="M13.227 21.925a10 10 0 1 1 8.767-9.588" />
        <path d="m14 18 4-4 4 4" />
        <path d="M18 22v-8" />
      </svg>
      <span>古い順</span>
    </button>
    <button class="sort-btn" data-mode="manual" title="じぶん順">
      <svg class="icon icon-sort" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="12" r="1" />
        <circle cx="9" cy="5" r="1" />
        <circle cx="9" cy="19" r="1" />
        <circle cx="15" cy="12" r="1" />
        <circle cx="15" cy="5" r="1" />
        <circle cx="15" cy="19" r="1" />
      </svg>
      <span>じぶん順</span>
    </button>
  </div>
  <div class="count-badge" id="countBadge"></div>
  <div class="card-list" id="cardList"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <svg class="icon icon-empty" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 5H3" />
      <path d="M11 12H3" />
      <path d="M11 19H3" />
      <path d="M21 16V5" />
      <circle cx="18" cy="16" r="3" />
    </svg>
    <p>歌詞カードがまだないよ！<br>右下の＋ボタンから追加しよう</p>
  </div>
</main>

<button class="fab fab-import" id="fabImport" title="連続インポート">
  <svg class="icon icon-import" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3v12" />
    <path d="m8 11 4 4 4-4" />
    <path d="M8 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4" />
  </svg>
</button>
<button class="fab" id="fabAdd" title="新規追加">＋</button>

<!-- 編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="modalTitle">新規追加</h2>
    <div class="form-group">
      <label>キャラ名</label>
      <input type="text" id="inputCharacter" placeholder="キャラ名を入力">
    </div>
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="inputTitle" placeholder="曲のタイトルを入力">
    </div>
    <div class="form-group">
      <label>歌詞</label>
      <textarea id="inputLyrics" placeholder="歌詞を入力..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnCancel">キャンセル</button>
      <button class="btn btn-primary" id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="card-header">
      <div>
        <div class="card-title" id="detailTitle"></div>
        <div class="card-character" id="detailCharacter" style="display:inline-block; margin-top:6px;"></div>
      </div>
    </div>
    <div class="detail-lyrics" id="detailLyrics"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnDetailClose">閉じる</button>
      <div class="modal-actions-right">
        <button class="btn btn-danger btn-sm" id="btnDelete">削除</button>
        <button class="btn btn-primary btn-sm" id="btnEdit">編集</button>
      </div>
    </div>
  </div>
</div>

<!-- 連続インポートモーダル -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h2>連続インポート <span class="import-counter" id="importCounter"></span></h2>

    <div id="importPasteView">
      <div class="form-group">
        <label>歌詞を貼り付け</label>
        <textarea id="importRaw" placeholder="Sunoの歌詞をそのままペースト..."></textarea>
      </div>
      <div class="import-options">
        <label class="checkbox-row"><input type="checkbox" id="chkKeepStructure"> 構造タグを残す（[Verse]など）</label>
        <label class="checkbox-row"><input type="checkbox" id="chkNormalize" checked> 表記をととのえる</label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary import-exit-btn" id="btnImportExit">終了</button>
        <button class="btn btn-primary" id="btnImportFormat">整形する</button>
      </div>
    </div>

    <div id="importPreviewView" style="display:none;">
      <div class="import-tag-info">登録先タグ: <strong id="importTagLabel"></strong></div>
      <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="importPreviewTitle" placeholder="タイトルを入力">
      </div>
      <div class="form-group">
        <label>歌詞</label>
        <textarea id="importPreviewLyrics"></textarea>
      </div>
      <div class="import-error" id="importPreviewError" style="display:none;">
        <span id="importErrorText"></span>
        <button class="btn btn-secondary btn-sm" id="btnImportRetry">再試行</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary import-exit-btn" id="btnImportExit2">終了</button>
        <button class="btn btn-secondary" id="btnImportBack">貼り直す</button>
        <button class="btn btn-primary" id="btnImportRegister">登録して次へ</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dbpferzntxfaxkucusne.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JUvwqzfkKsDR7Xwm3jJ6ug_TcVaeMwR';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// Edge Function用: PostgREST専用の Prefer は含めない
// （Access-Control-Allow-Headers に無いヘッダーを送るとプリフライトで弾かれる）
const functionHeaders = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json'
};

// じぶん順の一括リナンバー用: upsert(merge-duplicates)でid一致行だけを更新
const upsertHeaders = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'resolution=merge-duplicates,return=minimal'
};

const API = `${SUPABASE_URL}/rest/v1/lyrics`;
const FORMAT_ENDPOINT = `${SUPABASE_URL}/functions/v1/format-lyrics`;

const WORLD_TAG = { minato: '藤宮湊', noa: 'ノア' };
const SORT_MODES = ['new', 'old', 'manual'];
const DEFAULT_SORT_MODE = 'new';

let allCards = [];
let editingId = null;

// DOM
const searchInput = document.getElementById('searchInput');
const sortToggle = document.getElementById('sortToggle');
const cardList = document.getElementById('cardList');
const countBadge = document.getElementById('countBadge');
const emptyState = document.getElementById('emptyState');
const fabAdd = document.getElementById('fabAdd');
const fabImport = document.getElementById('fabImport');
const editModal = document.getElementById('editModal');
const detailModal = document.getElementById('detailModal');
const modalTitle = document.getElementById('modalTitle');
const inputCharacter = document.getElementById('inputCharacter');
const inputTitle = document.getElementById('inputTitle');
const inputLyrics = document.getElementById('inputLyrics');
const btnCancel = document.getElementById('btnCancel');
const btnSave = document.getElementById('btnSave');
const btnDetailClose = document.getElementById('btnDetailClose');
const btnDelete = document.getElementById('btnDelete');
const btnEdit = document.getElementById('btnEdit');
const detailTitle = document.getElementById('detailTitle');
const detailCharacter = document.getElementById('detailCharacter');
const detailLyrics = document.getElementById('detailLyrics');
const detailMeta = document.getElementById('detailMeta');

const worldToggle = document.getElementById('worldToggle');
const labelMinato = document.getElementById('labelMinato');
const labelNoa = document.getElementById('labelNoa');
const themeColorMeta = document.getElementById('themeColorMeta');

const importModal = document.getElementById('importModal');
const importPasteView = document.getElementById('importPasteView');
const importPreviewView = document.getElementById('importPreviewView');
const importRaw = document.getElementById('importRaw');
const chkKeepStructure = document.getElementById('chkKeepStructure');
const chkNormalize = document.getElementById('chkNormalize');
const importCounter = document.getElementById('importCounter');
const importPreviewTitle = document.getElementById('importPreviewTitle');
const importPreviewLyrics = document.getElementById('importPreviewLyrics');
const importTagLabel = document.getElementById('importTagLabel');
const importPreviewError = document.getElementById('importPreviewError');
const importErrorText = document.getElementById('importErrorText');
const btnImportFormat = document.getElementById('btnImportFormat');
const btnImportBack = document.getElementById('btnImportBack');
const btnImportRegister = document.getElementById('btnImportRegister');
const btnImportRetry = document.getElementById('btnImportRetry');

let currentDetailId = null;

// ---- 世界（ノア／湊）----
function getWorld() {
  return localStorage.getItem('lyricsAppWorld') || 'minato';
}

function isNightNow() {
  const h = new Date().getHours();
  return h >= 0 && h < 6;
}

function applyNoaTime(instant) {
  const html = document.documentElement;
  if (getWorld() !== 'noa') {
    html.removeAttribute('data-noa-time');
    return;
  }
  const night = isNightNow();
  const wasNight = html.getAttribute('data-noa-time') === 'night';
  if (night === wasNight) {
    if (!html.hasAttribute('data-noa-time')) html.setAttribute('data-noa-time', night ? 'night' : 'day');
    return;
  }
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!instant && night && !reduced) {
    html.classList.add('fading-to-night');
    setTimeout(() => html.classList.remove('fading-to-night'), 4500);
  }
  html.setAttribute('data-noa-time', night ? 'night' : 'day');
  updateThemeColor();
}

function updateThemeColor() {
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  if (accent) themeColorMeta.setAttribute('content', accent);
}

function updateWorldUI() {
  const w = getWorld();
  document.documentElement.setAttribute('data-world', w);
  labelMinato.classList.toggle('active', w === 'minato');
  labelNoa.classList.toggle('active', w === 'noa');
  updateThemeColor();
}

function setWorld(w) {
  localStorage.setItem('lyricsAppWorld', w);
  updateWorldUI();
  applyNoaTime(true);
  updateSortToggleUI();
  renderCards();
}

worldToggle.addEventListener('click', () => {
  setWorld(getWorld() === 'minato' ? 'noa' : 'minato');
});

updateWorldUI();
applyNoaTime(true);
setInterval(() => applyNoaTime(false), 60000);

// ---- 並び順（新しい順/古い順/じぶん順）----
// 並び順の記憶はワールドごとに独立
function getSortMode() {
  return localStorage.getItem(`sortMode_${getWorld()}`) || DEFAULT_SORT_MODE;
}

function setSortMode(mode) {
  if (!SORT_MODES.includes(mode)) return;
  localStorage.setItem(`sortMode_${getWorld()}`, mode);
  updateSortToggleUI();
  renderCards();
}

function updateSortToggleUI() {
  const mode = getSortMode();
  sortToggle.querySelectorAll('.sort-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

sortToggle.addEventListener('click', (e) => {
  const btn = e.target.closest('.sort-btn');
  if (btn) setSortMode(btn.dataset.mode);
});

function compareCards(a, b, mode) {
  if (mode === 'new') return new Date(b.created_at) - new Date(a.created_at);
  if (mode === 'old') return new Date(a.created_at) - new Date(b.created_at);
  // じぶん順: sort_orderの昇順。null同士は登録日の新しい順で末尾に。
  const aNull = a.sort_order === null || a.sort_order === undefined;
  const bNull = b.sort_order === null || b.sort_order === undefined;
  if (aNull && bNull) return new Date(b.created_at) - new Date(a.created_at);
  if (aNull) return 1;
  if (bNull) return -1;
  return a.sort_order - b.sort_order;
}

// 新規登録曲はじぶん順の一番上に来るよう、そのタグの最小sort_order - 1を割り当てる
function nextSortOrderForTag(tag) {
  const values = allCards
    .filter(c => c.tag === tag && c.sort_order !== null && c.sort_order !== undefined)
    .map(c => c.sort_order);
  return values.length ? Math.min(...values) - 1 : 0;
}

updateSortToggleUI();

// ---- カード表示 ----
async function fetchCards() {
  const res = await fetch(`${API}?order=updated_at.desc`, { headers });
  if (!res.ok) throw new Error('fetch failed');
  allCards = await res.json();
  renderCards();
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  return escapeHtml(text).replace(re, '<span class="highlight">$1</span>');
}

function cardMatchesWorld(c) {
  return !c.tag || c.tag === WORLD_TAG[getWorld()];
}

const GRIP_ICON = `<svg class="icon icon-grip" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="9" cy="12" r="1" /><circle cx="9" cy="5" r="1" /><circle cx="9" cy="19" r="1" />
  <circle cx="15" cy="12" r="1" /><circle cx="15" cy="5" r="1" /><circle cx="15" cy="19" r="1" />
</svg>`;

function renderCards() {
  const query = searchInput.value.trim().toLowerCase();
  const mode = getSortMode();
  let filtered = allCards.filter(cardMatchesWorld);
  if (query) {
    filtered = filtered.filter(c =>
      c.title.toLowerCase().includes(query) ||
      c.lyrics.toLowerCase().includes(query) ||
      c.character_name.toLowerCase().includes(query)
    );
  }
  filtered = filtered.slice().sort((a, b) => compareCards(a, b, mode));

  // 検索で一部だけ表示されている間は「そのタグの全曲」が定義できないためドラッグ無効
  const draggable = mode === 'manual' && !query;

  if (filtered.length === 0) {
    cardList.innerHTML = '';
    emptyState.style.display = 'block';
    countBadge.textContent = query ? `検索結果: 0件` : '';
  } else {
    emptyState.style.display = 'none';
    countBadge.textContent = query
      ? `検索結果: ${filtered.length}件`
      : `全${filtered.length}曲`;
    cardList.innerHTML = filtered.map(c => `
      <div class="card" data-id="${c.id}">
        ${draggable ? `<span class="card-grip" title="ドラッグして並び替え">${GRIP_ICON}</span>` : ''}
        <div class="card-body">
          <div class="card-header">
            <div class="card-title">${highlightText(c.title || '無題', query)}</div>
            ${c.character_name ? `<div class="card-character">${escapeHtml(c.character_name)}</div>` : ''}
          </div>
          <div class="card-lyrics">${highlightText(c.lyrics, query)}</div>
        </div>
      </div>
    `).join('');
  }
}

// モーダルはopen/closeのたびに作り直されず表示切替のみなので、
// スクロール位置が前回開いた時のまま残る。開くたびに先頭へ戻す。
function resetScroll(...els) {
  els.forEach(el => { if (el) el.scrollTop = 0; });
}

// モーダル表示中は一覧(body)を完全に固定する。
// overlay越しのタッチが背面へスクロールチェイニングして、モーダルを
// 閉じた後に一覧が「少しだけ」ずれて見える不具合の根治策。
// bodyLockCountで多重open/closeに備える（現状は同時に1つしか開かない想定だが念のため）。
let bodyLockCount = 0;
let savedScrollY = 0;

function lockBodyScroll() {
  if (bodyLockCount === 0) {
    savedScrollY = window.scrollY;
    document.body.style.top = `-${savedScrollY}px`;
    document.body.classList.add('scroll-locked');
  }
  bodyLockCount++;
}

function unlockBodyScroll() {
  bodyLockCount = Math.max(0, bodyLockCount - 1);
  if (bodyLockCount === 0) {
    document.body.classList.remove('scroll-locked');
    document.body.style.top = '';
    window.scrollTo(0, savedScrollY);
  }
}

function openEditModal(card) {
  editingId = card ? card.id : null;
  modalTitle.textContent = card ? '編集' : '新規追加';
  inputCharacter.value = card ? card.character_name : '';
  inputTitle.value = card ? card.title : '';
  inputLyrics.value = card ? card.lyrics : '';
  editModal.classList.add('active');
  resetScroll(editModal.querySelector('.modal'), inputLyrics);
  lockBodyScroll();
  inputTitle.focus();
}

function closeEditModal() {
  editModal.classList.remove('active');
  editingId = null;
  unlockBodyScroll();
}

function openDetailModal(card) {
  currentDetailId = card.id;
  detailTitle.textContent = card.title || '無題';
  detailCharacter.textContent = card.character_name;
  detailCharacter.style.display = card.character_name ? 'inline-block' : 'none';
  detailLyrics.textContent = card.lyrics;
  const d = new Date(card.updated_at);
  detailMeta.textContent = `最終更新: ${d.toLocaleDateString('ja-JP')} ${d.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})}`;
  detailModal.classList.add('active');
  resetScroll(detailModal.querySelector('.modal'));
  lockBodyScroll();
}

function closeDetailModal() {
  detailModal.classList.remove('active');
  currentDetailId = null;
  unlockBodyScroll();
}

async function saveCard() {
  const data = {
    character_name: inputCharacter.value.trim(),
    title: inputTitle.value.trim(),
    lyrics: inputLyrics.value,
    updated_at: new Date().toISOString()
  };
  if (!editingId) {
    data.tag = WORLD_TAG[getWorld()];
    data.sort_order = nextSortOrderForTag(data.tag);
  }

  btnSave.disabled = true;
  btnSave.textContent = '保存中...';

  try {
    if (editingId) {
      await fetch(`${API}?id=eq.${editingId}`, {
        method: 'PATCH', headers, body: JSON.stringify(data)
      });
    } else {
      await fetch(API, {
        method: 'POST', headers, body: JSON.stringify(data)
      });
    }
    closeEditModal();
    await fetchCards();
  } catch (e) {
    alert('保存に失敗しました: ' + e.message);
  } finally {
    btnSave.disabled = false;
    btnSave.textContent = '保存';
  }
}

async function deleteCard(id) {
  if (!confirm('この歌詞カードを削除しますか？')) return;
  await fetch(`${API}?id=eq.${id}`, { method: 'DELETE', headers });
  closeDetailModal();
  await fetchCards();
}

// ---- 連続インポート ----
let importCount = 0;
let importCache = { raw: '', keepStructureTags: false, normalizeText: true };

function updateImportCounter() {
  importCounter.textContent = importCount > 0 ? `${importCount}曲目 登録完了` : '';
}

function updateImportTagLabel() {
  importTagLabel.textContent = WORLD_TAG[getWorld()];
}

function showImportPaste() {
  importPasteView.style.display = '';
  importPreviewView.style.display = 'none';
  importPreviewError.style.display = 'none';
  resetScroll(importModal.querySelector('.modal'));
}

function showImportPreview() {
  importPasteView.style.display = 'none';
  importPreviewView.style.display = '';
  updateImportTagLabel();
  resetScroll(importModal.querySelector('.modal'), importPreviewLyrics);
}

function openImportModal() {
  importCount = 0;
  updateImportCounter();
  importRaw.value = '';
  showImportPaste();
  importModal.classList.add('active');
  lockBodyScroll();
  importRaw.focus();
}

function closeImportModal() {
  importModal.classList.remove('active');
  unlockBodyScroll();
}

async function requestFormat(raw, opts) {
  const res = await fetch(FORMAT_ENDPOINT, {
    method: 'POST',
    headers: functionHeaders,
    body: JSON.stringify({
      rawText: raw,
      keepStructureTags: opts.keepStructureTags,
      normalizeText: opts.normalizeText
    }),
    signal: AbortSignal.timeout(20000)
  });
  if (!res.ok) throw new Error(`format failed: ${res.status}`);
  return res.json();
}

async function runFormat(raw, opts) {
  btnImportFormat.disabled = true;
  btnImportFormat.textContent = '整形中...';
  try {
    const { title, lyrics } = await requestFormat(raw, opts);
    importPreviewTitle.value = title || '';
    importPreviewLyrics.value = lyrics || raw;
    importPreviewError.style.display = 'none';
    showImportPreview();
  } catch (e) {
    importPreviewTitle.value = '';
    importPreviewLyrics.value = raw;
    importErrorText.textContent = '整形に失敗したから手動で入力してね';
    importPreviewError.style.display = 'flex';
    showImportPreview();
  } finally {
    btnImportFormat.disabled = false;
    btnImportFormat.textContent = '整形する';
  }
}

btnImportFormat.addEventListener('click', () => {
  const raw = importRaw.value.trim();
  if (!raw) return;
  importCache = {
    raw,
    keepStructureTags: chkKeepStructure.checked,
    normalizeText: chkNormalize.checked
  };
  runFormat(importCache.raw, importCache);
});

btnImportRetry.addEventListener('click', () => {
  if (!importCache.raw) return;
  runFormat(importCache.raw, importCache);
});

btnImportBack.addEventListener('click', showImportPaste);
document.querySelectorAll('.import-exit-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    closeImportModal();
    fetchCards();
  });
});

btnImportRegister.addEventListener('click', async () => {
  const title = importPreviewTitle.value.trim();
  const lyrics = importPreviewLyrics.value;
  if (!title || !lyrics.trim()) {
    alert('タイトルと歌詞を入力してね');
    return;
  }
  btnImportRegister.disabled = true;
  try {
    const tag = WORLD_TAG[getWorld()];
    const sort_order = nextSortOrderForTag(tag);
    await fetch(API, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        character_name: tag,
        tag,
        title,
        lyrics,
        sort_order,
        updated_at: new Date().toISOString()
      })
    });
    // 連続登録中はfetchCardsを挟まないので、次のnextSortOrderForTagが
    // この曲を拾えるようローカルのallCardsにも反映しておく
    allCards.push({ tag, sort_order });
    importCount++;
    updateImportCounter();
    importRaw.value = '';
    showImportPaste();
    importRaw.focus();
  } catch (e) {
    alert('登録に失敗した: ' + e.message);
  } finally {
    btnImportRegister.disabled = false;
  }
});

fabImport.addEventListener('click', openImportModal);

// Events
fabAdd.addEventListener('click', () => openEditModal(null));
btnCancel.addEventListener('click', closeEditModal);
btnSave.addEventListener('click', saveCard);
btnDetailClose.addEventListener('click', closeDetailModal);
btnDelete.addEventListener('click', () => deleteCard(currentDetailId));
btnEdit.addEventListener('click', () => {
  const card = allCards.find(c => c.id === currentDetailId);
  closeDetailModal();
  if (card) openEditModal(card);
});

cardList.addEventListener('click', (e) => {
  if (e.target.closest('.card-grip')) return;
  const el = e.target.closest('.card');
  if (!el) return;
  const card = allCards.find(c => c.id === el.dataset.id);
  if (card) openDetailModal(card);
});

// ---- じぶん順のドラッグ並べ替え ----
// Pointer Eventsでマウス・タッチを一本化。ハンドル(touch-action:none)からの
// ドラッグ開始のみ発動、行本体タップは従来通り曲を開く。
let dragState = null;

function startDrag(e, grip) {
  const card = grip.closest('.card');
  if (!card) return;
  e.preventDefault();

  const rect = card.getBoundingClientRect();
  const placeholder = document.createElement('div');
  placeholder.className = 'drag-placeholder';
  placeholder.style.height = `${rect.height}px`;
  cardList.insertBefore(placeholder, card);

  card.classList.add('dragging');
  card.style.position = 'fixed';
  card.style.top = `${rect.top}px`;
  card.style.left = `${rect.left}px`;
  card.style.width = `${rect.width}px`;

  dragState = {
    card,
    placeholder,
    pointerId: e.pointerId,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top
  };

  grip.setPointerCapture(e.pointerId);
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e) {
  if (!dragState || e.pointerId !== dragState.pointerId) return;
  const { card, placeholder, offsetX, offsetY } = dragState;
  card.style.top = `${e.clientY - offsetY}px`;
  card.style.left = `${e.clientX - offsetX}px`;

  const siblings = Array.from(cardList.children).filter(el => el !== card && el !== placeholder);
  let target = null;
  for (const sib of siblings) {
    const r = sib.getBoundingClientRect();
    if (e.clientY < r.top + r.height / 2) { target = sib; break; }
  }
  if (target) cardList.insertBefore(placeholder, target);
  else cardList.appendChild(placeholder);
}

async function onDragEnd(e) {
  if (!dragState || e.pointerId !== dragState.pointerId) return;
  const { card, placeholder } = dragState;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);

  cardList.insertBefore(card, placeholder);
  placeholder.remove();
  card.classList.remove('dragging');
  card.style.position = '';
  card.style.top = '';
  card.style.left = '';
  card.style.width = '';
  dragState = null;

  const tag = WORLD_TAG[getWorld()];
  const domOrderIds = Array.from(cardList.children).map(el => el.dataset.id);
  const newOrderIds = domOrderIds.filter(id => {
    const c = allCards.find(x => x.id === id);
    return c && c.tag === tag;
  });

  const prevOrderIds = allCards
    .filter(c => c.tag === tag)
    .slice()
    .sort((a, b) => compareCards(a, b, 'manual'))
    .map(c => c.id);

  if (newOrderIds.join(',') === prevOrderIds.join(',')) return; // 変化なし

  // 画面は即時反映済み。allCardsのsort_orderも先に更新してからDBへバッチ保存。
  const prevValues = new Map(allCards.filter(c => c.tag === tag).map(c => [c.id, c.sort_order]));
  newOrderIds.forEach((id, i) => {
    const c = allCards.find(x => x.id === id);
    if (c) c.sort_order = i;
  });

  try {
    await persistManualOrder(newOrderIds);
  } catch (err) {
    alert('並び替えの保存に失敗した: ' + err.message);
    // DBと画面の食い違いを残さないよう、ドラッグ前の状態に戻す
    prevValues.forEach((v, id) => {
      const c = allCards.find(x => x.id === id);
      if (c) c.sort_order = v;
    });
    renderCards();
  }
}

async function persistManualOrder(orderedIds) {
  const updates = orderedIds.map((id, i) => ({ id, sort_order: i }));
  const res = await fetch(API, {
    method: 'POST',
    headers: upsertHeaders,
    body: JSON.stringify(updates)
  });
  if (!res.ok) throw new Error(`${res.status}`);
}

cardList.addEventListener('pointerdown', (e) => {
  const grip = e.target.closest('.card-grip');
  if (grip) startDrag(e, grip);
});

editModal.addEventListener('click', (e) => {
  if (e.target === editModal) closeEditModal();
});

detailModal.addEventListener('click', (e) => {
  if (e.target === detailModal) closeDetailModal();
});

let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderCards, 200);
});

fetchCards();

// ---- PWA: Service Worker登録 ----
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
